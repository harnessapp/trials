<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trials - powered by Trotify</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

  <div class="topbar">

    <div class="topbar-left">
      <h1>Trials - powered by Trotify</h1>
      <div class="subtitle">Harness trial insights</div>
    </div>

    <div class="topbar-actions">
      <img src="app_icon_v2.png" class="topbar-logo" alt="Trotify icon">
    </div>

  </div>


  <div class="content">

    <div class="panel">

      <div class="panel-header">
        <h2>Trials</h2>
        <div id="race-title" class="summary-text">(loading runners)</div>
      </div>

      <div id="trials-container" class="trials-scroll"></div>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
